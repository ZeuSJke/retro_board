# Продакшн-оверрайд для TrueNAS + Nginx Proxy Manager
# Запуск:
#   ./deploy.sh
# или вручную:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

services:
  db:
    restart: always
    deploy:
      resources:
        limits:
          memory: 512m

  backend:
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2
    ports:
      - "8000:8000"
    restart: always
    deploy:
      resources:
        limits:
          memory: 512m

  frontend:
    restart: always
    deploy:
      resources:
        limits:
          memory: 128m
